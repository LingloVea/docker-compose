services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    platform: linux/arm64

    ports:
      - "4000:4000"

    env_file:
      - .env

    volumes:
      - ./config.yaml:/app/config.yaml

    entrypoint: ["litellm"]
    command: ["--config", "/app/config.yaml", "--port", "4000"]

    restart: always
