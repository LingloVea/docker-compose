services:
  openlist:
    image: openlistteam/openlist:latest
    container_name: openlist

    ports:
      - "5244:5244"
      - "5245:5245"

    volumes:
      - /Volumes/Nexus/Documents/Docker/Openlist/data:/opt/openlist/data

    environment:
      - TZ=Asia/Shanghai
      - UMASK=022 
    
    restart: always

